name: Build content pages

# data/ veya build/ değişince statik sembol sayfalarını yeniden üretir ve commit'ler.
# Üretilen dizinler (ruya, en, ar, sitemap.xml, robots.txt) tetikleyici path'lerde
# olmadığından otomatik döngü oluşmaz.

on:
  push:
    branches: ["main"]
    paths:
      - "data/**"
      - "build/**"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-content
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate pages
        run: node build/generate.mjs

      - name: Commit generated pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ruya en ar sitemap.xml robots.txt
          if git diff --cached --quiet; then
            echo "No content changes."
          else
            git commit -m "chore: regenerate content pages [skip ci]"
            git push
          fi
